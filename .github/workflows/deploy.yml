name: Deploy to Cloudflare Workers

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  WORKER_NAME: grok-art-proxy
  D1_DATABASE_NAME: grok-imagine
  KV_NAMESPACE_TITLE: KV_CACHE

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create D1 Database (if not exists)
        id: create-d1
        run: |
          # Try to create D1 database, ignore if already exists
          OUTPUT=$(npx wrangler d1 create ${{ env.D1_DATABASE_NAME }} 2>&1) || true
          echo "$OUTPUT"

          # Extract database_id from output
          if echo "$OUTPUT" | grep -q "database_id"; then
            D1_ID=$(echo "$OUTPUT" | grep "database_id" | sed 's/.*= "\(.*\)"/\1/')
            echo "d1_id=$D1_ID" >> $GITHUB_OUTPUT
            echo "Created new D1 database: $D1_ID"
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Create KV Namespace (if not exists)
        id: create-kv
        run: |
          # Try to create KV namespace, ignore if already exists
          OUTPUT=$(npx wrangler kv namespace create KV_CACHE 2>&1) || true
          echo "$OUTPUT"

          # Extract id from output
          if echo "$OUTPUT" | grep -q 'id = "'; then
            KV_ID=$(echo "$OUTPUT" | grep 'id = "' | sed 's/.*id = "\(.*\)"/\1/')
            echo "kv_id=$KV_ID" >> $GITHUB_OUTPUT
            echo "Created new KV namespace: $KV_ID"
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Get existing resource IDs
        id: get-resources
        run: |
          echo "--- Resource Discovery Log ---"
          
          # --- D1 Database ID Resolver ---
          D1_ID=""
          D1_LIST=$(npx wrangler d1 list --json 2>/dev/null || echo "[]")

          validate_d1_id() {
            candidate="$1"
            [ -n "$candidate" ] || return 1
            echo "$D1_LIST" | jq -e --arg id "$candidate" '.[] | select(.uuid == $id)' >/dev/null 2>&1
          }

          # 1. Prefer secret ID, but only if it exists under current account.
          SECRET_D1="${{ secrets.D1_DATABASE_ID }}"
          if validate_d1_id "$SECRET_D1"; then
            D1_ID="$SECRET_D1"
            echo "✅ Using D1 ID from secret: $D1_ID"
          elif [ -n "$SECRET_D1" ]; then
            echo "⚠️ D1_DATABASE_ID secret not found under current account, ignoring: $SECRET_D1"
          fi

          # 2. Check creation output.
          if [ -z "$D1_ID" ] && validate_d1_id "${{ steps.create-d1.outputs.d1_id }}"; then
            D1_ID="${{ steps.create-d1.outputs.d1_id }}"
            echo "✅ Using D1 ID from creation step: $D1_ID"
          fi

          # 3. Check wrangler.toml value, but only if valid for current account.
          if [ -z "$D1_ID" ]; then
            TOML_D1=$(sed -n '/\[\[d1_databases\]\]/,/database_id/p' wrangler.toml | grep "database_id" | sed -E 's/.*= "(.*)"/\1/' || echo "")
            if validate_d1_id "$TOML_D1"; then
              D1_ID="$TOML_D1"
              echo "✅ Using D1 ID from wrangler.toml: $D1_ID"
            elif [ -n "$TOML_D1" ] && [ "$TOML_D1" != "YOUR_D1_DATABASE_ID" ] && [ "$TOML_D1" != "database_id" ]; then
              echo "⚠️ D1 ID in wrangler.toml not found under current account, ignoring: $TOML_D1"
            fi
          fi

          # 4. Fallback: search by configured D1 database name.
          if [ -z "$D1_ID" ]; then
            echo "🔍 Searching D1 by name: ${{ env.D1_DATABASE_NAME }}"
            D1_ID=$(echo "$D1_LIST" | jq -r --arg name "${{ env.D1_DATABASE_NAME }}" '.[] | select(.name == $name) | .uuid' | head -1 || echo "")
            if [ -n "$D1_ID" ]; then
              echo "✅ Found D1 ID via API by exact name: $D1_ID"
            else
              D1_ID=$(echo "$D1_LIST" | jq -r --arg name "${{ env.D1_DATABASE_NAME }}" '.[] | select(.name | contains($name)) | .uuid' | head -1 || echo "")
              [ -n "$D1_ID" ] && echo "✅ Found D1 ID via API by fuzzy name: $D1_ID"
            fi
          fi

          # --- KV Namespace ID Resolver ---
          KV_ID=""
          KV_LIST=$(npx wrangler kv namespace list --json 2>/dev/null || echo "[]")

          validate_kv_id() {
            candidate="$1"
            [ -n "$candidate" ] || return 1
            echo "$KV_LIST" | jq -e --arg id "$candidate" '.[] | select(.id == $id)' >/dev/null 2>&1
          }

          # 1. Prefer secret ID, but only if it exists under current account.
          SECRET_KV="${{ secrets.KV_NAMESPACE_ID }}"
          if validate_kv_id "$SECRET_KV"; then
            KV_ID="$SECRET_KV"
            echo "✅ Using KV ID from secret: $KV_ID"
          elif [ -n "$SECRET_KV" ]; then
            echo "⚠️ KV_NAMESPACE_ID secret not found under current account, ignoring: $SECRET_KV"
          fi

          # 2. Check creation output.
          if [ -z "$KV_ID" ] && validate_kv_id "${{ steps.create-kv.outputs.kv_id }}"; then
            KV_ID="${{ steps.create-kv.outputs.kv_id }}"
            echo "✅ Using KV ID from creation step: $KV_ID"
          fi

          # 3. Check wrangler.toml value, but only if valid for current account.
          if [ -z "$KV_ID" ]; then
            TOML_KV=$(sed -n '/\[\[kv_namespaces\]\]/,/id =/p' wrangler.toml | grep -E '^id =' | sed -E 's/.*= "(.*)"/\1/' || echo "")
            if validate_kv_id "$TOML_KV"; then
              KV_ID="$TOML_KV"
              echo "✅ Using KV ID from wrangler.toml: $KV_ID"
            elif [ -n "$TOML_KV" ] && [ "$TOML_KV" != "YOUR_KV_NAMESPACE_ID" ] && [ "$TOML_KV" != "id" ]; then
              echo "⚠️ KV ID in wrangler.toml not found under current account, ignoring: $TOML_KV"
            fi
          fi

          # 4. Fallback: search by configured KV namespace title.
          if [ -z "$KV_ID" ]; then
            echo "🔍 Searching KV by title: ${{ env.KV_NAMESPACE_TITLE }}"
            KV_ID=$(echo "$KV_LIST" | jq -r --arg title "${{ env.KV_NAMESPACE_TITLE }}" '.[] | select(.title == $title) | .id' | head -1 || echo "")
            if [ -n "$KV_ID" ]; then
              echo "✅ Found KV ID via API by exact title: $KV_ID"
            else
              KV_ID=$(echo "$KV_LIST" | jq -r --arg title "${{ env.KV_NAMESPACE_TITLE }}" '.[] | select(.title | contains($title)) | .id' | head -1 || echo "")
              [ -n "$KV_ID" ] && echo "✅ Found KV ID via API by fuzzy title: $KV_ID"
            fi
          fi

          echo "------------------------------"
          if [ -z "$D1_ID" ]; then
            echo "❌ D1 ID not resolved for current Cloudflare account."
            echo "Available D1 databases:"
            echo "$D1_LIST" | jq -r '.[] | "- \(.name): \(.uuid)"'
          fi
          if [ -z "$KV_ID" ]; then
            echo "❌ KV ID not resolved for current Cloudflare account."
            echo "Available KV namespaces:"
            echo "$KV_LIST" | jq -r '.[] | "- \(.title): \(.id)"'
          fi

          echo "d1_id=$D1_ID" >> $GITHUB_OUTPUT
          echo "kv_id=$KV_ID" >> $GITHUB_OUTPUT
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Update wrangler.toml
        run: |
          D1_ID="${{ steps.get-resources.outputs.d1_id }}"
          KV_ID="${{ steps.get-resources.outputs.kv_id }}"

          if [ -n "$D1_ID" ]; then
            sed -i "s/database_id = \"YOUR_D1_DATABASE_ID\"/database_id = \"$D1_ID\"/" wrangler.toml
            sed -i "s/database_id = \".*\"/database_id = \"$D1_ID\"/" wrangler.toml
          else
            echo "::error::D1 Database ID not found. Please set D1_DATABASE_ID secret."
            exit 1
          fi

          if [ -n "$KV_ID" ]; then
            sed -i "s/id = \"YOUR_KV_NAMESPACE_ID\"/id = \"$KV_ID\"/" wrangler.toml
            sed -i "s/^id = \".*\"/id = \"$KV_ID\"/" wrangler.toml
          else
            echo "::error::KV Namespace ID not found. Please set KV_NAMESPACE_ID secret."
            exit 1
          fi

          echo "Updated wrangler.toml:"
          cat wrangler.toml

      - name: Run D1 Migrations
        run: npx wrangler d1 migrations apply DB --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy to Cloudflare Workers
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Set Authentication Secrets
        run: |
          if [ -n "${{ secrets.AUTH_USERNAME }}" ]; then
            echo "${{ secrets.AUTH_USERNAME }}" | npx wrangler secret put AUTH_USERNAME 2>/dev/null || \
            echo "${{ secrets.AUTH_USERNAME }}" | npx wrangler secret put AUTH_USERNAME --force 2>/dev/null || true
          fi

          if [ -n "${{ secrets.AUTH_PASSWORD }}" ]; then
            echo "${{ secrets.AUTH_PASSWORD }}" | npx wrangler secret put AUTH_PASSWORD 2>/dev/null || \
            echo "${{ secrets.AUTH_PASSWORD }}" | npx wrangler secret put AUTH_PASSWORD --force 2>/dev/null || true
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deployment Summary
        run: |
          echo "## Deployment Complete!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Access URL" >> $GITHUB_STEP_SUMMARY
          echo "https://${{ env.WORKER_NAME }}.<your-account>.workers.dev" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Resources" >> $GITHUB_STEP_SUMMARY
          echo "- D1 Database: \`${{ steps.get-resources.outputs.d1_id }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- KV Namespace: \`${{ steps.get-resources.outputs.kv_id }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Next Steps" >> $GITHUB_STEP_SUMMARY
          echo "1. Login with your configured credentials" >> $GITHUB_STEP_SUMMARY
          echo "2. Add your Grok tokens to start generating images" >> $GITHUB_STEP_SUMMARY
